<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayHub Premium Gallery</title>
    <style>
        :root { --primary-color: #0088cc; --bg-color: #0a0a0a; --card-bg: #161616; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: white; margin: 0; padding-bottom: 50px; }
        header { background: #000; padding: 20px; border-bottom: 2px solid var(--primary-color); margin-bottom: 30px; }
        h1 { margin: 0; font-size: 24px; color: var(--primary-color); text-transform: uppercase; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
            padding: 0 20px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        
        .video-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }
        
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .info { padding: 15px; text-align: left; }
        .video-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #efefef; line-height: 1.4; }
        .video-meta { font-size: 12px; color: #777; display: flex; justify-content: space-between; }
        
        .no-data { padding: 100px; color: #444; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <h1>PlayHub Video Gallery</h1>
</header>

<div class="gallery" id="container">
    <p class="no-data">Menghubungkan ke database...</p>
</div>

<script>
    async function loadVideos() {
        try {
            const res = await fetch('data_telegram.json');
            const data = await res.json();
            const container = document.getElementById('container');
            container.innerHTML = '';

            const updates = data.result || [];
            // Filter hanya pesan yang punya video
            const videoMessages = updates.filter(item => item.channel_post && item.channel_post.video);

            if (videoMessages.length === 0) {
                container.innerHTML = '<p class="no-data">Belum ada video. Kirim video ke channel Anda!</p>';
                return;
            }

            // Tampilkan dari yang terbaru (reverse)
            videoMessages.reverse().forEach(item => {
                const msg = item.channel_post;
                const chatId = msg.chat.username || msg.chat.id;
                const msgId = msg.message_id;
                // Ambil caption/judul video jika ada
                const caption = msg.caption || "Video Tanpa Judul";

                const div = document.createElement('div');
                div.className = 'video-card';
                div.innerHTML = `
                    <div class="video-wrapper">
                        <iframe src="https://t.me/${chatId}/${msgId}?embed=1" frameborder="0" scrolling="no"></iframe>
                    </div>
                    <div class="info">
                        <div class="video-title">${caption}</div>
                        <div class="video-meta">
                            <span>Post ID: #${msgId}</span>
                            <span>Stream Ready</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (e) {
            document.getElementById('container').innerHTML = '<p class="no-data">Gagal memuat galeri. Silakan jalankan Actions di GitHub.</p>';
        }
    }
    loadVideos();
</script>

</body>
</html>
