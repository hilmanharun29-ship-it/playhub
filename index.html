<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PlayHub - Nonton Video Viral Terlengkap & Terbaru 2026</title>
    <meta name="description" content="Temukan koleksi video viral terbaru dan konten eksklusif hanya di PlayHub. Update setiap hari langsung dari Telegram.">
    <meta name="keywords" content="video viral, playhub, video terbaru, konten eksklusif, galeri video telegram">
    
    <meta property="og:title" content="PlayHub - Pusat Video Viral">
    <meta property="og:description" content="Koleksi video paling update hari ini.">
    <meta property="og:type" content="website">

    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #050505; --card: #121212; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 80px; }
        
        header { 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 22px; letter-spacing: 3px; color: #fff; text-transform: uppercase; }

        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; padding: 25px; max-width: 1300px; margin: 0 auto; 
        }

        .video-card { 
            background: var(--card); border-radius: 20px; overflow: hidden;
            border: 1px solid #222; position: relative; transition: 0.3s;
        }
        .video-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card-header-accent { height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); }

        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .info { padding: 15px; background: #181818; }
        .video-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #efefef; height: 45px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .btn-play {
            display: block; width: 100%; padding: 10px; background: #222; border-radius: 8px;
            color: var(--primary); text-decoration: none; font-size: 12px; font-weight: bold;
            text-align: center; border: 1px solid #333; transition: 0.2s;
        }
        .btn-play:hover { background: var(--primary); color: #000; }
    </style>
</head>
<body>

<header>
    <h1>PLAYHUB PREMIUM</h1>
</header>

<div class="gallery" id="container">
    </div>

<script>
    async function loadVideos() {
        try {
            const res = await fetch('data_telegram.json');
            const data = await res.json();
            const updates = data.result || [];
            const container = document.getElementById('container');
            
            // Ambil hanya pesan yang ada videonya
            const videoPosts = updates.filter(item => item.channel_post && item.channel_post.video);
            
            // Urutkan dari yang paling baru
            videoPosts.reverse().forEach(item => {
                const msg = item.channel_post;
                const chatId = msg.chat.username || msg.chat.id;
                const caption = msg.caption || "Exclusive Content #" + msg.message_id;

                const div = document.createElement('div');
                div.className = 'video-card';
                div.innerHTML = `
                    <div class="card-header-accent"></div>
                    <div class="video-wrapper">
                        <iframe src="https://t.me/${chatId}/${msg.message_id}?embed=1" frameborder="0" scrolling="no"></iframe>
                    </div>
                    <div class="info">
                        <div class="video-title">${caption}</div>
                        <a href="https://t.me/${chatId}/${msg.message_id}" target="_blank" class="btn-play">OPEN IN TELEGRAM</a>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (e) {
            console.error("Gagal memuat data:", e);
        }
    }
    loadVideos();
</script>

<script src="https://pl28973394.profitablecpmratenetwork.com/5e/7c/4d/5e7c4d976c8b8f47d9d12a20a6a520ad.js"></script>

</body>
</html>
